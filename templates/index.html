<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisis Sentimen TikTok</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        .header h1 { color: #1a1a2e; margin-bottom: 10px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }
        .stat-card .number { font-size: 48px; font-weight: 800; }
        .stat-card.total .number { color: #8b5cf6; }
        .stat-card.positif .number { color: #10b981; }
        .stat-card.netral .number { color: #3b82f6; }
        .stat-card.negatif .number { color: #ef4444; }
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card, .prediction-card, .table-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
        }
        .prediction-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .prediction-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        .prediction-input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .result.positif { background: #d1fae5; color: #065f46; }
        .result.netral { background: #dbeafe; color: #1e40af; }
        .result.negatif { background: #fee2e2; color: #991b1b; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background: #f8f9fa; }
        .sentiment-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .sentiment-badge.positif { background: #d1fae5; color: #065f46; }
        .sentiment-badge.netral { background: #dbeafe; color: #1e40af; }
        .sentiment-badge.negatif { background: #fee2e2; color: #991b1b; }
        .footer { text-align: center; padding: 20px; color: white; }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Analisis Sentimen Komentar TikTok</h1>
            <p>Kasus Penyiraman Air Keras terhadap Aktivis Andri Yunus</p>
        </div>

        <div class="stats-grid" id="stats">
            <div class="stat-card total"><div class="number" id="totalCount">-</div><div>Total</div></div>
            <div class="stat-card positif"><div class="number" id="positifCount">-</div><div>Positif</div></div>
            <div class="stat-card netral"><div class="number" id="netralCount">-</div><div>Netral</div></div>
            <div class="stat-card negatif"><div class="number" id="negatifCount">-</div><div>Negatif</div></div>
        </div>

        <div class="charts-row">
            <div class="chart-card"><h3>Distribusi Sentimen</h3><canvas id="barChart"></canvas></div>
            <div class="chart-card"><h3>Persentase Sentimen</h3><canvas id="pieChart"></canvas></div>
        </div>

        <div class="prediction-card">
            <h3>Prediksi Sentimen</h3>
            <div class="prediction-input">
                <input type="text" id="predictionText" placeholder="Masukkan teks komentar...">
                <button onclick="predict()">Prediksi</button>
            </div>
            <div id="result" style="display: none;"></div>
        </div>

        <div class="table-section">
            <h3>Sample Komentar</h3>
            <div id="commentsTable">Loading...</div>
        </div>

        <div class="footer">
            <p>© 2026 Analisis Sentimen - Tugas Akhir</p>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000/api';
        let barChart, pieChart;

        async function loadStats() {
            const res = await fetch(`${API}/stats`);
            const data = await res.json();
            document.getElementById('totalCount').innerText = data.total;
            document.getElementById('positifCount').innerText = data.positif;
            document.getElementById('netralCount').innerText = data.netral;
            document.getElementById('negatifCount').innerText = data.negatif;
        }

        async function loadDistribution() {
            const res = await fetch(`${API}/sentiment_distribution`);
            const data = await res.json();
            
            if (barChart) barChart.destroy();
            if (pieChart) pieChart.destroy();
            
            barChart = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: { labels: data.labels, datasets: [{ label: 'Jumlah', data: data.values, backgroundColor: ['#10b981', '#3b82f6', '#ef4444'] }] }
            });
            
            pieChart = new Chart(document.getElementById('pieChart'), {
                type: 'pie',
                data: { labels: data.labels, datasets: [{ data: data.values, backgroundColor: ['#10b981', '#3b82f6', '#ef4444'] }] }
            });
        }

        async function loadComments() {
            const res = await fetch(`${API}/comments?limit=30`);
            const data = await res.json();
            let html = `<table><thead><tr><th>Komentar</th><th>Sentimen</th><th>Like</th></tr></thead><tbody>`;
            data.comments.forEach(c => {
                html += `<tr><td>${c.komentar.substring(0, 80)}...</td><td><span class="sentiment-badge ${c.sentimen}">${c.sentimen}</span></td><td>${c.like}</td></tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('commentsTable').innerHTML = html;
        }

        async function predict() {
            const text = document.getElementById('predictionText').value;
            if (!text) return;
            
            const res = await fetch(`${API}/predict`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });
            const data = await res.json();
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = `result ${data.sentiment}`;
            resultDiv.innerHTML = `"${data.text}"<br>→ Sentimen: <strong>${data.sentiment.toUpperCase()}</strong><br>Confidence: ${(data.confidence * 100).toFixed(1)}%`;
        }

        loadStats();
        loadDistribution();
        loadComments();
    </script>
</body>
</html>
